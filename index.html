  <style>
    :root {
      --canvas: #FAF8F4;
      --ink: #1A1815;
      --muted: #6E6A62;
      --accent: #A97E2F;
      --border: #E2DED5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--canvas);
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px 24px;
    }

    .stage {
      opacity: 0;
      transform: translateY(12px);
      animation: rise 600ms ease-out forwards;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .composition {
      text-align: center;
      max-width: 600px;
    }

    .portrait {
      width: 128px;
      height: 128px;
      border-radius: 999px;
      object-fit: cover;
      object-position: 50% 22%;
      margin: 0 auto 30px;
      display: block;
      box-shadow: 0 1px 3px rgba(26, 24, 21, 0.08);
    }

    .name {
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      font-weight: 500;
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    .tagline {
      margin-top: 18px;
      font-size: 17px;
      line-height: 1.5;
      color: var(--muted);
    }

    .links {
      margin-top: 34px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .pill {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      text-decoration: none;
      font-size: 15px;
      line-height: 1;
      transition: border-color 200ms ease, color 200ms ease;
    }

    .pill:hover,
    .pill:focus-visible {
      border-color: var(--accent);
      color: var(--accent);
    }

    .pill:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .caption {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 28px;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .portrait {
        width: 104px;
        height: 104px;
        margin-bottom: 24px;
      }

      .name {
        font-size: 40px;
      }

      .tagline {
        font-size: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>

  <div class="stage composition">
    <img class="portrait" src="sarah-graves.jpg" width="256" height="256" alt="Sarah Graves" onerror="this.style.display='none'">

    <nav class="links" aria-label="Social links">

      <a class="pill" href="https://www.instagram.com/sarahkgraves" target="_blank" rel="noopener">Instagram</a>

      <a class="pill" href="mailto:sarahkgraves2@gmail.com">Email</a>
    </nav>
  </div>
  <div class="caption">New Site in Progress &middot; 2026</div>
